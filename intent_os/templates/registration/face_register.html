<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTENT_OS - Register Face</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}?v=3.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg-darker);
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 153, 211, 0.1) 0%, transparent 50%),
                              radial-gradient(circle at 100% 0%, rgba(135, 94, 255, 0.15) 0%, transparent 40%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }
        .container {
            background: rgba(22, 25, 33, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
        }
        .header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 22px;
            letter-spacing: 2px;
            margin: 0 0 8px 0;
            background: linear-gradient(90deg, #1499d3, #875eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin: 0 0 30px 0;
        }
        
        /* High-tech Face Scan HUD */
        .scan-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            border: 2px dashed rgba(20, 153, 211, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 0 20px rgba(20, 153, 211, 0.1);
        }
        
        .face-silhouette {
            width: 110px;
            height: 110px;
            fill: none;
            stroke: rgba(20, 153, 211, 0.4);
            stroke-width: 2;
            stroke-linecap: round;
        }
        
        .scan-bar {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            box-shadow: 0 0 10px var(--accent-cyan);
            animation: scan 3s infinite ease-in-out;
        }
        
        .hud-circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(135, 94, 255, 0.2);
            animation: rotateHUD 20s infinite linear;
        }
        .hud-circle.outer {
            width: 180px;
            height: 180px;
            border-top-color: var(--accent-purple);
            border-bottom-color: var(--accent-cyan);
        }
        
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        
        @keyframes rotateHUD {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .status-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-cyan);
            background: rgba(20, 153, 211, 0.05);
            border: 1px solid rgba(20, 153, 211, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .info-text {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
            margin: 0;
        }
        
        .dot-pulse {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-cyan);
            margin-right: 5px;
            box-shadow: 0 0 8px var(--accent-cyan);
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        <div class="header">
            <h1>FACE PROFILE SETUP</h1>
            <p>Enroll Operator Biometrics</p>
        </div>
        
        <div class="scan-wrapper">
            <div class="hud-circle outer"></div>
            <svg class="face-silhouette" viewBox="0 0 24 24">
                <path d="M12,2A10,10,0,0,0,2,12v1a7,7,0,0,0,7,7h6a7,7,0,0,0,7,-7v-1A10,10,0,0,0,12,2Z"/>
                <path d="M8,11a1.5,1.5,0,1,0,0,-3a1.5,1.5,0,0,0,0,3Z" fill="rgba(20,153,211,0.4)"/>
                <path d="M16,11a1.5,1.5,0,1,0,0,-3a1.5,1.5,0,0,0,0,3Z" fill="rgba(20,153,211,0.4)"/>
                <path d="M12,14c-1.5,0,-3,1,-3,2.5s3,2.5,3,2.5s3,-1,3,-2.5s-1.5,-2.5,-3,-2.5Z"/>
            </svg>
            <div class="scan-bar"></div>
        </div>
        
        <div class="status-box">
            <span class="dot-pulse"></span> SYSTEM: WAITING FOR FACE ENROLLMENT...
        </div>
        
        <p class="info-text">
            Ensure your webcam is enabled and looking straight at you. The gesture assistant will automatically capture and register your face profile.
        </p>
    </div>

    <script>
        async function checkStatus() {
            try {
                const response = await fetch('/api/face-status/');
                const data = await response.json();
                
                if (data.status === 'verified') {
                    // Registration succeeded and user is verified
                    window.location.href = '/';
                }
            } catch (err) {
                console.error("Error polling face status", err);
            }
        }
        
        // Poll status every 1 second
        setInterval(checkStatus, 1000);
    </script>
</body>
</html>
